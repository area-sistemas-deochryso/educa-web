<!-- #region Template -->
<!-- * User avatar trigger + popover menu. -->
<button
	class="profile-trigger"
	[class.open]="isOpen()"
	(click)="toggleMenu($event)"
	type="button"
>
	<div class="profile-avatar-wrapper">
		<p-avatar [label]="initials()" shape="circle" size="normal" class="profile-avatar" />
		@if (showNotifications() && unreadBadge()) {
			<span class="avatar-notif-badge">{{ unreadBadge() }}</span>
		}
	</div>
	<i class="pi pi-chevron-down chevron-icon"></i>
</button>

<p-popover
	#profilePopover
	appendTo="body"
	[styleClass]="'profile-popover ' + popoverStyleClass()"
	(onShow)="onPopoverShow()"
	(onHide)="onPopoverHide()"
>
	<div class="popover-content">
		<div class="popover-header">
			<p-avatar [label]="initials()" shape="circle" size="large" class="popover-avatar" />
			<div class="popover-user-info">
				<span class="popover-name">{{ displayName() }}</span>
				<span class="popover-role">{{ userRole() }}</span>
			</div>
		</div>
		@if (showNotifications()) {
			<div class="popover-divider"></div>
			<button class="menu-btn" (click)="onNotificationsClick()" type="button">
				<i class="pi pi-bell" [class.bell-shake]="unreadBadge()"></i>
				<span>Notificaciones</span>
				@if (unreadBadge()) {
					<p-badge [value]="unreadBadge()" severity="danger" class="notif-badge" />
				}
			</button>
		}
		<div class="popover-divider"></div>
		<button class="menu-btn" (click)="onInfoClick()" type="button">
			<i class="pi pi-user-edit"></i>
			<span>Información</span>
		</button>
		<div class="popover-divider"></div>
		<button class="logout-btn" (click)="onLogout()" type="button">
			<i class="pi pi-sign-out"></i>
			<span>Cerrar sesión</span>
		</button>
	</div>
</p-popover>

<!-- Diálogo de información - siempre en el DOM, nunca en @if -->
<app-user-info-dialog
	[visible]="infoDialogVisible()"
	(visibleChange)="onInfoDialogVisibleChange($event)"
/>
<!-- #endregion -->
