<!-- #region Template -->
<header class="intranet-header">
	<!-- #region Desktop header -->
	<div class="header-container desktop-header">
		<a routerLink="/" class="logo-link">
			<picture>
				<source srcset="images/logo.avif" type="image/avif" />
				<source srcset="images/logo.webp" type="image/webp" />
				<img
					src="images/logo.png"
					alt="Educa.com Logo"
					class="logo"
					width="120"
					height="42.7"
					fetchpriority="high"
				/>
			</picture>
		</a>

		<!-- * Module selector (search + dropdown, replaces pills). -->
		<app-module-selector
			[modulos]="modulos()"
			[selectedModuloId]="selectedModuloId()"
			(moduloSelected)="selectModulo($event)"
		/>

		<!-- * Nav items of selected module (circular window of 2, with dropdown support). -->
		<nav class="nav-links">
			@for (item of visibleNavItems(); track item.label) {
				<app-nav-item
					[route]="item.route"
					[label]="item.label"
					[icon]="item.icon"
					[exact]="item.exact ?? false"
					[queryParams]="item.queryParams"
					[children]="item.children"
					(click)="onNavItemClick(item)"
				/>
			}
		</nav>

		<app-user-profile-menu (logoutClick)="logout()" />
	</div>
	<!-- #endregion -->

	<!-- #region Mobile header -->
	<div class="header-container mobile-header">
		<a routerLink="/" class="logo-link">
			<picture>
				<source srcset="images/logo.avif" type="image/avif" />
				<source srcset="images/logo.webp" type="image/webp" />
				<img
					src="images/logo.png"
					alt="Educa.com Logo"
					class="logo"
					width="120"
					height="40"
					fetchpriority="high"
				/>
			</picture>
		</a>
		<app-mobile-menu [modulos]="modulos()" (logoutClick)="logout()" />
	</div>
	<!-- #endregion -->
</header>

<app-offline-indicator />

<main class="intranet-content">
	<router-outlet />
</main>

@if (showNotifications()) {
	<app-floating-notification-bell />
}
@if (showVoiceRecognition()) {
	<app-voice-button />
}

<!-- Reporte de usuario: dialog SIEMPRE en el DOM (regla dialogs-sync.md) + launcher flotante -->
@if (showFeedbackReport()) {
	<app-feedback-report-launcher />
}
<app-feedback-report-dialog />

<app-sync-status />
<app-access-denied-modal />
<!-- #endregion -->
