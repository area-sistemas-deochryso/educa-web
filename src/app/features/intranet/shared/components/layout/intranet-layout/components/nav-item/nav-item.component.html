<!-- #region Template -->
@if (hasChildren()) {
	<!-- * Parent item with dropdown. -->
	<div class="nav-dropdown" [class.open]="isOpen()" [class.active]="isActive()">
		<button class="nav-item parent" (click)="toggle()">
			<i [class]="icon"></i>
			<span>{{ label }}</span>
			<i class="pi pi-chevron-down chevron"></i>
		</button>

		@if (isOpen()) {
			<div class="dropdown-menu">
				@for (child of children; track child.label) {
					@if (child.children && child.children.length > 0) {
						<!-- * Nested submenu group. -->
						<div class="submenu-item">
							<app-nav-item
								[label]="child.label"
								[icon]="child.icon"
								[children]="child.children"
							/>
						</div>
					} @else {
						<!-- * Leaf link inside dropdown. -->
						<div class="dropdown-item-row">
							<a
								[routerLink]="child.route"
								[queryParams]="child.queryParams"
								routerLinkActive="active"
								[routerLinkActiveOptions]="{ exact: child.exact ?? false }"
								class="dropdown-item"
							>
								<i [class]="child.icon"></i>
								<span>{{ child.label }}</span>
							</a>
							@if (favoritesService.isPersonalizing() && child.route) {
								<button
									type="button"
									class="star-btn"
									[class.starred]="favoritesService.isFavorite(child.route)"
									[disabled]="!favoritesService.isFavorite(child.route) && !favoritesService.canAddMore()"
									(click)="onStarClick($event, child.route)"
									[attr.aria-label]="favoritesService.isFavorite(child.route) ? 'Quitar de accesos rápidos' : 'Agregar a accesos rápidos'"
								>
									<i [class]="favoritesService.isFavorite(child.route) ? 'pi pi-star-fill' : 'pi pi-star'"></i>
								</button>
							}
						</div>
					}
				}
			</div>
		}
	</div>
} @else {
	<!-- * Simple single-level link. -->
	<a
		[routerLink]="route"
		[queryParams]="queryParams"
		routerLinkActive="active"
		[routerLinkActiveOptions]="{ exact: exact }"
		class="nav-item"
	>
		<i [class]="icon"></i>
		<span>{{ label }}</span>
	</a>
}
<!-- #endregion -->
