<div class="scope-notice" role="note">
	<i class="pi pi-info-circle scope-notice__icon" aria-hidden="true"></i>
	<div class="scope-notice__text">
		<p class="scope-notice__title">
			@if (nombre(); as n) {
				{{ n }} aún no usa asistencia biométrica.
			} @else {
				Este alumno aún no usa asistencia biométrica.
			}
		</p>
		<p class="scope-notice__body">
			El colegio habilitó el CrossChex solo desde <strong>5to Primaria en adelante</strong>. La
			asistencia diaria se sigue manejando con el cuaderno del salón.
		</p>
	</div>
</div>
