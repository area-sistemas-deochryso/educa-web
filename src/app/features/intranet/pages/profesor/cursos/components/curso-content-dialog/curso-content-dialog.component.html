<!-- #region Dialog principal de contenido -->
<p-dialog
	[visible]="vm().contentDialogVisible"
	(visibleChange)="onVisibleChange($event)"
	(onShow)="onDialogShow()"
	[modal]="true"
	[dismissableMask]="true"
	[style]="dialogStyle()"
	[contentStyle]="contentStyle()"
	[styleClass]="isFullscreen() ? 'fullscreen-dialog' : ''"
>
	<ng-template #header>
		<div class="dialog-header-custom">
			<span class="p-dialog-title">{{ vm().contenido ? vm().contenido!.cursoNombre : 'Contenido del Curso' }}</span>
			<button
				class="fullscreen-toggle-btn"
				type="button"
				(click)="toggleFullscreen()"
				[attr.aria-label]="isFullscreen() ? 'Salir de pantalla completa' : 'Expandir a pantalla completa'"
			>
				<i [class]="isFullscreen() ? 'pi pi-window-minimize' : 'pi pi-window-maximize'"></i>
			</button>
		</div>
	</ng-template>
	@if (vm().contenido; as contenido) {
		<div class="modal-body">
			<p-tabs [value]="activeTab()" (valueChange)="onTabChange($any($event))">
				<p-tablist>
					<p-tab value="0">
						<i class="pi pi-book tab-icon"></i>
						Contenido
					</p-tab>
					<p-tab value="1">
						<i class="pi pi-chart-bar tab-icon"></i>
						Calificaciones
					</p-tab>
					<p-tab value="2">
						<i class="pi pi-info-circle tab-icon"></i>
						Información
					</p-tab>
				</p-tablist>

				<p-tabpanels>
					<!-- #region Tab Contenido -->
					<p-tabpanel value="0">
						<div class="tab-panel-body">
							<app-semanas-accordion />
						</div>
					</p-tabpanel>
					<!-- #endregion -->

					<!-- #region Tab Calificaciones -->
					<p-tabpanel value="1">
						<div class="tab-panel-body">
							<div style="display: flex; justify-content: flex-end; margin-bottom: 0.5rem">
								<button
									pButton
									icon="pi pi-refresh"
									class="p-button-rounded p-button-text p-button-sm"
									(click)="onRefreshCalificaciones()"
									[disabled]="calVm().loading"
									pTooltip="Refrescar"
									tooltipPosition="top"
									[pt]="{ root: { 'aria-label': 'Refrescar calificaciones' } }"
								></button>
							</div>
							<app-calificaciones-panel
								[calificacionesPorSemana]="calVm().calificacionesPorSemana"
								[periodos]="calVm().periodos"
								[loading]="calVm().loading"
								[saving]="calVm().saving"
								[totalEvaluaciones]="calVm().totalEvaluaciones"
								(crearEvaluacion)="onCrearEvaluacion()"
								(editarEvaluacion)="onEditarEvaluacion($event)"
								(calificarEstudiantes)="onCalificarEstudiantes($event)"
								(eliminarEvaluacion)="onEliminarEvaluacion($event)"
								(cambiarTipo)="onCambiarTipo($event)"
								(configurarPeriodos)="onConfigurarPeriodos()"
							/>
						</div>
					</p-tabpanel>
					<!-- #endregion -->

					<!-- #region Tab Información -->
					<p-tabpanel value="2">
						<div class="tab-panel-body">
							<div class="info-grid">
								<div class="info-card">
									<p class="info-section-title">Información del curso</p>

									<div class="info-fields-row">
										<div class="info-field">
											<i class="pi pi-book"></i>
											<div>
												<p class="info-field-label">Curso</p>
												<p class="info-field-value">{{ contenido.cursoNombre }}</p>
											</div>
										</div>
										<div class="info-field">
											<i class="pi pi-building"></i>
											<div>
												<p class="info-field-label">Salón</p>
												<p class="info-field-value">{{ contenido.salonDescripcion }}</p>
											</div>
										</div>
										<div class="info-field">
											<i class="pi pi-calendar"></i>
											<div>
												<p class="info-field-label">Semanas</p>
												<p class="info-field-value">{{ contenido.numeroSemanas }} semanas</p>
											</div>
										</div>
									</div>
								</div>

								<div class="info-stats">
									<button
										class="stat-box files clickable"
										type="button"
										(click)="onOpenArchivosSummary()"
										aria-label="Ver todos los archivos"
									>
										<i class="pi pi-paperclip"></i>
										<div class="stat-number">{{ vm().totalArchivos }}</div>
										<div class="stat-label">Archivos</div>
									</button>
									<button
										class="stat-box tasks clickable"
										type="button"
										(click)="onOpenTareasSummary()"
										aria-label="Ver todas las tareas"
									>
										<i class="pi pi-file-edit"></i>
										<div class="stat-number">{{ vm().totalTareas }}</div>
										<div class="stat-label">Tareas</div>
									</button>
									<button
										class="stat-box students clickable"
										type="button"
										(click)="onOpenStudentFiles()"
										aria-label="Ver archivos de estudiantes"
									>
										<i class="pi pi-users"></i>
										<div class="stat-number">{{ vm().totalArchivosEstudiantes }}</div>
										<div class="stat-label">Adjuntos Est.</div>
									</button>
									<button
										class="stat-box calificaciones clickable"
										type="button"
										(click)="onTabChange('1')"
										aria-label="Ir a calificaciones"
									>
										<i class="pi pi-chart-bar"></i>
										<div class="stat-number">{{ calVm().totalEvaluaciones }}</div>
										<div class="stat-label">Calificaciones</div>
									</button>
								</div>
							</div>

							<button class="danger-link" (click)="onDeleteContenido()">
								<i class="pi pi-trash"></i>
								Eliminar todo el contenido
							</button>
						</div>
					</p-tabpanel>
					<!-- #endregion -->

					</p-tabpanels>
			</p-tabs>
		</div>
	}
</p-dialog>

<!-- #region Sub-dialogs -->
<app-semana-edit-dialog
	[visible]="vm().semanaEditDialogVisible"
	[semana]="vm().selectedSemana"
	[saving]="vm().saving"
	(visibleChange)="onSemanaEditVisibleChange($event)"
	(save)="onSaveSemana($event)"
/>

<app-tarea-dialog
	[visible]="vm().tareaDialogVisible"
	[tarea]="vm().selectedTarea"
	[saving]="vm().saving"
	(visibleChange)="onTareaVisibleChange($event)"
	(createTarea)="onCreateTarea($event)"
	(updateTarea)="onUpdateTarea($event)"
/>

<app-archivos-summary-dialog
	[visible]="vm().archivosSummaryDialogVisible"
	[semanas]="vm().semanas"
	(visibleChange)="onArchivosSummaryVisibleChange($event)"
/>

<app-tareas-summary-dialog
	[visible]="vm().tareasSummaryDialogVisible"
	[semanas]="vm().semanas"
	(visibleChange)="onTareasSummaryVisibleChange($event)"
/>

<app-student-files-dialog
	[visible]="vm().studentFilesDialogVisible"
	[data]="vm().studentFilesData"
	[loading]="vm().studentFilesLoading"
	[calificaciones]="calVm().calificaciones"
	(visibleChange)="onStudentFilesVisibleChange($event)"
	(irACalificaciones)="onStudentFilesIrACalificaciones()"
/>

<app-student-task-submissions-dialog
	[visible]="vm().taskSubmissionsDialogVisible"
	[data]="vm().taskSubmissionsData"
	[tarea]="vm().taskSubmissionsTarea"
	[loading]="vm().taskSubmissionsLoading"
	(visibleChange)="onTaskSubmissionsVisibleChange($event)"
	(irACalificaciones)="onTaskSubmissionsIrACalificaciones()"
/>

<!-- Calificaciones dialogs -->
<app-evaluacion-form-dialog
	[visible]="calVm().calificacionDialogVisible"
	[saving]="calVm().saving"
	[editing]="calVm().editingCalificacion"
	[semanas]="vm().semanas"
	[contenidoId]="vm().contenido?.id ?? null"
	(visibleChange)="onCalificacionDialogVisibleChange($event)"
	(save)="onSaveEvaluacion($event)"
/>

<app-calificar-dialog
	[visible]="calVm().calificarDialogVisible"
	[saving]="calVm().saving"
	[calificacion]="calVm().selectedCalificacion"
	[estudiantes]="estudiantesList()"
	[grupos]="calVm().gruposForCalificar"
	(visibleChange)="onCalificarDialogVisibleChange($event)"
	(save)="onSaveCalificaciones($event)"
	(saveGrupos)="onSaveCalificacionesGrupos($event)"
/>

<app-periodos-config-dialog
	[visible]="calVm().periodosDialogVisible"
	[saving]="calVm().saving"
	[periodos]="calVm().periodos"
	[contenidoId]="vm().contenido?.id ?? null"
	[totalSemanas]="vm().contenido?.numeroSemanas ?? 16"
	(visibleChange)="onPeriodosDialogVisibleChange($event)"
	(crearPeriodo)="onCrearPeriodo($event)"
	(eliminarPeriodo)="onEliminarPeriodo($event)"
/>

<p-confirmDialog />
<!-- #endregion -->
