<div class="campus-navigation" [class.embedded]="embedded()">
	<!-- #region Panel lateral: Horario del día -->
	@if (!embedded()) {
		<aside class="schedule-sidebar">
			<app-schedule-panel
				[items]="vm().scheduleItems"
				[scheduleReady]="vm().scheduleReady"
				[currentSalonId]="vm().currentOrNextClass?.salonId ?? null"
				(navigate)="onNavigateToSalon($event)"
			/>
		</aside>
	}

	<!-- #endregion -->
	<!-- #region Área principal: Mapa + controles -->
	<main class="map-area">
		<!-- Controles superiores -->
		<div class="controls-row">
			<app-floor-selector
				[floors]="vm().floors"
				[selectedFloor]="vm().selectedFloor"
				(floorChange)="onFloorChange($event)"
			/>

			<app-location-selector
				#locationSelector
				[allOptions]="vm().allNodeOptions"
				[startNodeId]="vm().startNodeId"
				[destinationNodeId]="vm().destinationNodeId"
				[hasPath]="vm().hasPath"
				(startChange)="onStartChange($event)"
				(destinationChange)="onDestinationChange($event)"
				(clear)="onClearPath()"
			/>

			<!-- Botón 3D -->
			@if (vm().hasCampusData) {
				<button
					type="button"
					class="btn-3d"
					[class.btn-3d--active]="vm().hasPath"
					(click)="show3d.set(true)"
					[title]="vm().hasPath ? 'Practicar ruta en 3D' : 'Explorar campus en 3D'"
				>
					<span class="btn-3d__icon">🕹️</span>
					<span class="btn-3d__label">{{ vm().hasPath ? 'Practicar ruta' : 'Ver en 3D' }}</span>
				</button>
			}
		</div>

		<!-- Mapa SVG -->
		<app-campus-map
			[nodes]="vm().currentFloorNodes"
			[edges]="vm().currentFloorEdges"
			[selectedFloor]="vm().selectedFloor"
			[pathPoints]="vm().currentFloorPathPoints"
			[startNodeId]="vm().startNodeId"
			[destinationNodeId]="vm().destinationNodeId"
			(nodeClick)="onMapNodeClick($event)"
		/>

		<!-- Pasos de navegación -->
		@if (vm().hasPath) {
			<app-navigation-steps [pathResult]="vm().pathResult" />
		}
	</main>
</div>
<!-- #endregion -->

<!-- #region Modo 3D (overlay fullscreen) -->
@if (show3d()) {
	<app-campus-3d-view
		[nodes]="vm().allNodes"
		[edges]="vm().allEdges"
		[startNodeId]="vm().startNodeId"
		[destinationNodeId]="vm().destinationNodeId"
		[pathResult]="vm().pathResult"
		(closestNodeChange)="on3dPositionChange($event)"
		(close)="show3d.set(false)"
	/>
}
<!-- #endregion -->
