<!-- #region Template -->
<div class="home-container">
	<app-welcome-section [title]="welcomeTitle()" />

	@if (showAttendanceWidget()) {
		<app-attendance-summary-widget />
	}

	@if (showQuickAccess() && quickAccessItems().length > 0) {
		<section class="quick-access">
			<h2>Accesos Rápidos</h2>
			<div class="quick-access-grid">
				@for (item of quickAccessItems(); track item.route) {
					<app-quick-access-card
						[label]="item.label"
						[path]="item.route"
						[icon]="item.icon"
						[description]="item.description"
						[preview]="item.preview"
					/>
				}
			</div>
		</section>
	}
</div>
<!-- #endregion -->
