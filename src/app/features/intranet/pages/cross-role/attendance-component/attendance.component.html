<!-- #region Template -->
<div class="attendance-container">
	<!-- * Header compartido por todos los roles -->
	<app-attendance-header
		[loading]="loading()"
		[showModeSelector]="showModeSelector()"
		[selectedMode]="selectedMode()"
		(modeChange)="onModeChange($event)"
		(reload)="onReload()"
	/>

	<!-- * Componentes especializados por rol -->
	@switch (userRole()) {
		@case ('Apoderado') {
			<app-attendance-apoderado />
		}
		@case ('Profesor') {
			<app-attendance-profesor
				(showModeSelectorChange)="onProfesorShowModeSelectorChange($event)"
			/>
		}
		@case ('Director') {
			<app-attendance-director />
		}
		@case ('Asistente Administrativo') {
			<!-- * Plan 28 Chat 4a: AA viendo /intranet/asistencia ve su propia asistencia,
			     no el panel admin. Las correcciones formales sobre 'A' las hacen los
			     supervisores (Director, Promotor, Coordinador Académico) vía
			     /intranet/admin/asistencias — INV-AD08. -->
			<app-attendance-asistente-admin-propia />
		}
		@case ('Promotor') {
			<app-attendance-director />
		}
		@case ('Coordinador Académico') {
			<app-attendance-director />
		}
		@case ('Estudiante') {
			<app-attendance-estudiante />
		}
		@default {
			<!-- ! Fallback defensivo: si llega un rol no reconocido se muestra este estado. -->
			<div class="error-state">
				<p>Rol no reconocido. Redirigiendo...</p>
			</div>
		}
	}
</div>
<!-- #endregion -->
