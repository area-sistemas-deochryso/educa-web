<!-- #region Template -->
<app-attendance-dashboard
	[selectedRole]="selectedRoleTipo()"
	[viewMode]="currentViewMode()"
	(roleSelect)="onRoleSelect($event)"
/>

@switch (selectedSubMenu()) {
	@case ('estudiantes') {
		<app-attendance-director-estudiantes />
	}
	@case ('profesores') {
		<app-attendance-director-profesores />
	}
	@case ('asistentes-admin') {
		<app-attendance-director-asistentes-admin />
	}
	@case ('coordinadores') {
		<app-attendance-director-staff #coordinadoresStaff tipoPersona="C" />
	}
	@case ('promotores') {
		<app-attendance-director-staff #promotoresStaff tipoPersona="M" />
	}
	@case ('directores') {
		<app-attendance-director-staff #directoresStaff tipoPersona="D" />
	}
	@case ('administradores') {
		<app-attendance-director-staff #administradoresStaff tipoPersona="N" />
	}
}
<!-- #endregion -->
