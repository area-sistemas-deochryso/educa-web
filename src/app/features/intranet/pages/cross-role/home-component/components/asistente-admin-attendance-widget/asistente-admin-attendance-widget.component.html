<!-- #region Template -->
<div class="widget-card">
	<div class="widget-header">
		<div class="widget-title">
			<i class="pi pi-user"></i>
			<h3>Mi asistencia de hoy</h3>
		</div>
		<a routerLink="/intranet/asistencia" class="widget-link"
			>Ver detalle <i class="pi pi-arrow-right"></i
		></a>
	</div>

	@if (loading()) {
		<div class="widget-skeleton">
			<app-skeleton-loader variant="rect" width="30%" height="16px" />
			<app-skeleton-loader variant="rect" width="100%" height="56px" />
		</div>
	} @else {
		<section class="resumen-section">
			@if (miAsistencia(); as m) {
				<div class="mi-asistencia-row">
					<div class="mi-horas">
						<div class="hora-item">
							<span class="hora-label">Entrada</span>
							<span class="hora-value">{{ m.horaEntrada ?? '—' }}</span>
						</div>
						<div class="hora-item">
							<span class="hora-label">Salida</span>
							<span class="hora-value">{{ m.horaSalida ?? '—' }}</span>
						</div>
					</div>
					<span class="estado-badge" [class]="miEstadoClass()">
						{{ miEstadoLabel() }}
					</span>
				</div>
			} @else {
				<div class="widget-empty">
					<i class="pi pi-info-circle"></i>
					<span>Sin registro de hoy</span>
				</div>
			}
		</section>
	}
</div>
<!-- #endregion -->
