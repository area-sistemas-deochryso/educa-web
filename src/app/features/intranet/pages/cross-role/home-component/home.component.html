<!-- #region Template -->
<div class="home-container">
	<app-welcome-section [title]="welcomeTitle()" />

	@if (showAttendanceWidget()) {
		<app-attendance-summary-widget />
	}

	@if (showProfesorWidget()) {
		<app-profesor-attendance-widget />
	}

	@if (showQuickAccess()) {
		<section class="quick-access">
			<div class="quick-access-header">
				<h2>Accesos Rápidos</h2>
			</div>
			@if (quickAccessItems().length > 0) {
				<div class="quick-access-grid">
					@for (item of quickAccessItems(); track item.route) {
						<app-quick-access-card
							[label]="item.label"
							[path]="item.route"
							[icon]="item.icon"
							[description]="item.description"
							[preview]="item.preview"
						/>
					}
				</div>
			} @else {
				<p class="no-favorites-hint">
					Usa el buscador <kbd>Ctrl+K</kbd> y marca con <i class="pi pi-star"></i> hasta 4 páginas como accesos rápidos.
				</p>
			}
		</section>
	}
</div>
<!-- #endregion -->
