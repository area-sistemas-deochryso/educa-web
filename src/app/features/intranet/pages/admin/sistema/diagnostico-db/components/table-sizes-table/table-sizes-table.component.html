<section class="table-sizes">
	<header class="section-header">
		<div class="section-title">
			<i class="pi pi-table"></i>
			<h3>Tamaño de tablas</h3>
		</div>
		<button
			pButton
			icon="pi pi-refresh"
			class="p-button-text p-button-sm"
			[loading]="loading()"
			(click)="onRefresh()"
		></button>
	</header>

	@if (error()) {
		<div class="empty-state">
			<i class="pi pi-exclamation-triangle"></i>
			<span>{{ error() }}</span>
		</div>
	}

	@if (tables().length === 0 && !loading() && !error()) {
		<div class="empty-state">
			<i class="pi pi-info-circle"></i>
			<span>Sin datos de tablas disponibles.</span>
		</div>
	}

	@if (tables().length > 0) {
		<p-table [value]="tables()" [tableStyle]="{ 'min-width': '30rem' }" [sortField]="'rowCount'" [sortOrder]="-1">
			<ng-template #header>
				<tr>
					<th pSortableColumn="tableName">Tabla <p-sortIcon field="tableName" /></th>
					<th pSortableColumn="rowCount" style="width: 10rem">Filas <p-sortIcon field="rowCount" /></th>
				</tr>
			</ng-template>
			<ng-template #body let-row>
				<tr>
					<td><code>{{ row.tableName }}</code></td>
					<td>{{ row.rowCount | number }}</td>
				</tr>
			</ng-template>
		</p-table>
	}
</section>
