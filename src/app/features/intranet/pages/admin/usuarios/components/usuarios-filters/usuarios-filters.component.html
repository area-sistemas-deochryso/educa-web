<!-- #region Template -->
<section class="filters-section">
	<!-- * Search input -->
	<div class="search-box">
		<i class="pi pi-search"></i>
		<input
			type="text"
			pInputText
			placeholder="Buscar por nombre, DNI o correo..."
			[ngModel]="searchTerm()"
			(ngModelChange)="onSearchChange($event)"
		/>
	</div>

	<!-- * Role filter -->
	<p-select
		[options]="options().rolesOptions"
		[ngModel]="filterRol()"
		(ngModelChange)="onFilterRolChange($event)"
		placeholder="Todos los roles"
		appendTo="body"
		[style]="{ minWidth: '160px' }"
	/>

	<!-- * Status filter -->
	<p-select
		[options]="options().estadoOptions"
		[ngModel]="filterEstado()"
		(ngModelChange)="onFilterEstadoChange($event)"
		placeholder="Estado"
		appendTo="body"
		[style]="{ minWidth: '140px' }"
	/>

	<!-- * Clear filters -->
	<button
		pButton
		label="Limpiar"
		icon="pi pi-filter-slash"
		class="p-button-text"
		(click)="onClearFilters()"
		[pt]="{
			root: {
				'aria-label': 'Limpiar',
			},
		}"
	></button>

	<div class="filter-spacer"></div>

	<!-- * Export credentials actions -->
	<button
		pButton
		[icon]="esVerano() ? 'pi pi-sun' : 'pi pi-calendar'"
		[label]="esVerano() ? 'Verano' : 'Regular'"
		class="p-button-text p-button-sm"
		(click)="togglePeriodo()"
		[pt]="{
			root: {
				'aria-label': esVerano() ? 'Cambiar a periodo regular' : 'Cambiar a periodo de verano',
			},
		}"
	></button>

	<button
		pButton
		icon="pi pi-download"
		label="Credenciales Alumnos"
		class="p-button-outlined"
		(click)="onExportCredenciales('Estudiante')"
		[pt]="{
			root: {
				'aria-label': 'Exportar credenciales de alumnos a Excel',
			},
		}"
	></button>

	<button
		pButton
		icon="pi pi-download"
		label="Credenciales Profesores"
		class="p-button-outlined"
		(click)="onExportCredenciales('Profesor')"
		[pt]="{
			root: {
				'aria-label': 'Exportar credenciales de profesores a Excel',
			},
		}"
	></button>

	<!-- * Import students action -->
	<button
		pButton
		icon="pi pi-upload"
		label="Importar"
		class="p-button-outlined"
		(click)="onImportUsuarios()"
		[pt]="{
			root: {
				'aria-label': 'Importar estudiantes desde Excel',
			},
		}"
	></button>

	<!-- * New user action -->
	<button
		pButton
		label="Nuevo Usuario"
		icon="pi pi-plus"
		class="p-button-success"
		style="color: white"
		(click)="onNewUsuario()"
		[pt]="{
			root: {
				'aria-label': 'Nuevo Usuario',
			},
		}"
	></button>
</section>
<!-- #endregion -->
