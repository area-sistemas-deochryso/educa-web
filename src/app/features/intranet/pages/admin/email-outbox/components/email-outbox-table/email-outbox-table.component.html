<!-- #region Tabla -->
<p-table
	[value]="items()"
	[paginator]="true"
	[rows]="5"
	[rowsPerPageOptions]="[5, 10, 15]"
	[loading]="loading()"
	[showCurrentPageReport]="true"
	currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords}"
	styleClass="p-datatable-sm"
	[scrollable]="true"
>
	<ng-template pTemplate="header">
		<tr>
			<th style="width: 50px">#</th>
			<th pSortableColumn="tipo" style="width: 120px">
				Tipo <p-sortIcon field="tipo" />
			</th>
			<th>Destinatario / Asunto</th>
			<th pSortableColumn="estado" style="width: 110px">
				Estado <p-sortIcon field="estado" />
			</th>
			<th pSortableColumn="tipoFallo" style="width: 150px">
				Tipo de fallo <p-sortIcon field="tipoFallo" />
			</th>
			<th style="width: 80px">Intentos</th>
			<th pSortableColumn="fechaReg" style="width: 140px">
				Fecha <p-sortIcon field="fechaReg" />
			</th>
			<th style="width: 110px">Correlation</th>
			<th style="width: 100px">Acciones</th>
		</tr>
	</ng-template>

	<ng-template pTemplate="body" let-item let-i="rowIndex">
		<tr>
			<td>{{ i + 1 }}</td>
			<td>
				<p-tag [value]="item.tipo" styleClass="tag-neutral" />
			</td>
			<td>
				<div class="cell-main">{{ item.destinatario }}</div>
				<div class="cell-sub">{{ item.asunto }}</div>
			</td>
			<td>
				<p-tag
					[value]="getEstadoLabel(item.estado)"
					[severity]="getEstadoSeverity(item.estado)"
				/>
			</td>
			<td>
				<p-tag
					[value]="item.tipoFallo | tipoFalloLabel"
					[severity]="item.tipoFallo | tipoFalloSeverity"
					[pTooltip]="item.ultimoError || ''"
					tooltipPosition="top"
				/>
			</td>
			<td class="text-center">{{ item.intentos }}/{{ item.maxIntentos }}</td>
			<td>{{ item.fechaReg | date: 'dd/MM/yy HH:mm' }}</td>
			<td>
				<app-correlation-id-pill [id]="item.correlationId" [compact]="true" />
			</td>
			<td>
				<div class="action-buttons">
					<button
						pButton
						icon="pi pi-eye"
						class="p-button-rounded p-button-text p-button-sm"
						pTooltip="Ver detalle"
						tooltipPosition="top"
						(click)="viewDetail.emit(item)"
						[pt]="{
							root: {
								'aria-label': 'Ver detalle',
							},
						}"
					></button>
					@if (item.estado === 'FAILED') {
						<button
							pButton
							icon="pi pi-refresh"
							class="p-button-rounded p-button-text p-button-sm p-button-warning"
							[pTooltip]="
								esPermanente(item.tipoFallo)
									? 'No se puede reintentar: fallo permanente. Corregir el registro origen primero.'
									: 'Reintentar'
							"
							tooltipPosition="top"
							[disabled]="esPermanente(item.tipoFallo)"
							(click)="retry.emit(item)"
							[pt]="{
								root: {
									'aria-label': esPermanente(item.tipoFallo)
										? 'Reintento bloqueado por fallo permanente'
										: 'Reintentar envío',
								},
							}"
						></button>
					}
				</div>
			</td>
		</tr>
	</ng-template>

	<ng-template pTemplate="emptymessage">
		<tr>
			<td colspan="9" class="text-center p-4">No se encontraron correos</td>
		</tr>
	</ng-template>
</p-table>
<!-- #endregion -->
