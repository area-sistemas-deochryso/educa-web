<section class="table-section" aria-label="Estudiantes sin correo apoderado">
	<header class="section-header">
		<h3>Estudiantes sin correo apoderado</h3>
		<!-- BE: filas con EST_CorreoApoderado vacío. -->
		<span class="section-subtitle">
			Entradas del día sin correo del apoderado registrado — trabajo de
			matrícula pendiente
		</span>
	</header>

	<p-table [value]="data()" class="p-datatable-sm" styleClass="p-datatable-gridlines">
		<ng-template #header>
			<tr>
				<th class="label-uppercase col-dni">DNI</th>
				<th class="label-uppercase">Nombre</th>
				<th class="label-uppercase col-salon">Salón</th>
			</tr>
		</ng-template>
		<ng-template #body let-row>
			<tr>
				<td class="col-dni">
					<code>{{ row.dniMasked }}</code>
				</td>
				<td class="cell-nombre">{{ row.nombreCompleto }}</td>
				<td class="col-salon">
					<p-tag [value]="row.salon" styleClass="tag-neutral" />
				</td>
			</tr>
		</ng-template>
		<ng-template #emptymessage>
			<tr>
				<td colspan="3" class="empty-message">
					<div class="empty-state">
						<i class="pi pi-check-circle"></i>
						<p>Sin estudiantes en esta categoría</p>
					</div>
				</td>
			</tr>
		</ng-template>
	</p-table>
</section>
