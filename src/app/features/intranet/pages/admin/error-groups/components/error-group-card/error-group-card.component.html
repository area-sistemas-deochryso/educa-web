<div class="card-header">
	<div class="card-header-tags">
		<p-tag
			[value]="group().severidad"
			[severity]="severidadSeverity()"
			styleClass="severity-tag"
		/>
		@if (hasPostResolucion()) {
			<p-tag
				value="Reabierto"
				severity="danger"
				icon="pi pi-history"
				styleClass="regresion-tag"
				[pTooltip]="'Reabierto — ' + group().contadorPostResolucion + ' ocurrencia(s) después de resolver'"
				tooltipPosition="top"
			/>
		}
	</div>
	<span class="counter" pTooltip="Ocurrencias totales" tooltipPosition="top">
		<i class="pi pi-list"></i>
		{{ group().contadorTotal }}
	</span>
</div>

<div class="card-usuarios" pTooltip="Usuarios únicos afectados" tooltipPosition="top">
	<i class="pi pi-users"></i>
	{{ group().usuariosUnicos }}
</div>

<div class="card-body">
	<span
		class="message"
		[pTooltip]="group().mensajeRepresentativo"
		tooltipPosition="top"
	>
		{{ group().mensajeRepresentativo }}
	</span>
	@if (group().errorCode) {
		<span class="error-code">{{ group().errorCode }}</span>
	}
</div>

<div class="card-sparkline">
	@if (trendLoading()) {
		<span class="card-sparkline__loading" aria-label="Cargando ocurrencias">…</span>
	} @else {
		<button
			type="button"
			class="card-sparkline__btn"
			(click)="onSparklineClick($event)"
			[attr.aria-label]="'Ver ocurrencias 30 días ampliado de ' + group().mensajeRepresentativo"
			pTooltip="Ver ocurrencias 30 días ampliado"
			tooltipPosition="top"
		>
			<app-error-occurrence-timeline
				[data]="trendData()"
				[height]="28"
				[ariaLabel]="'Ocurrencias de los últimos 30 días de ' + group().mensajeRepresentativo"
			/>
		</button>
	}
</div>

<div class="card-footer">
	<span class="origen" [pTooltip]="group().origen" tooltipPosition="top">
		<i [class]="origenIcon()"></i>
	</span>
	<span class="fecha">{{ group().ultimaFecha | date: 'dd/MM HH:mm' }}</span>
</div>
