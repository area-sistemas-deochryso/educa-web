<!-- #region Template -->
<app-page-header icon="pi pi-users" title="Administración de Usuarios" subtitle="Gestiona todos los usuarios del sistema">
	<div class="header-actions">
		<!-- * Migration button (dev only, sits next to "Nuevo") -->
		@if (showMigration()) {
			<button
				pButton
				icon="pi pi-shield"
				label="Migrar Contraseñas"
				class="p-button-warning p-button-sm migration-header-btn"
				[class.migration-header-btn--spotlight]="migrationSpotlight()"
				[loading]="migrationLoading()"
				(click)="migratePasswords.emit()"
				[pt]="{ root: { 'aria-label': 'Migrar contraseñas a campo encriptado' } }"
			></button>
		}

		<!-- * Contextual new button -->
		<button
			pButton
			icon="pi pi-user-plus"
			[label]="newButtonLabel()"
			class="p-button-success p-button-sm"
			(click)="onNewUsuario()"
			[pt]="{ root: { 'aria-label': newButtonLabel() } }"
		></button>

		<!-- * Overflow menu -->
		<button
			pButton
			icon="pi pi-ellipsis-v"
			class="p-button-text p-button-sm btn-icon"
			(click)="overflowMenu.toggle($event)"
			[pt]="{ root: { 'aria-label': 'Más acciones' } }"
		></button>
		<p-menu #overflowMenu [model]="overflowMenuItems()" [popup]="true" appendTo="body" />
	</div>
</app-page-header>

<!-- * Export dialog -->
<p-dialog
	header="Exportar Credenciales"
	[visible]="exportDialogVisible()"
	(visibleChange)="onExportDialogVisibleChange($event)"
	[modal]="true"
	[style]="{ width: '420px' }"
	[draggable]="false"
>
	<div class="export-dialog-content">
		<p class="export-description">
			Genera un archivo Excel con las credenciales (nombre, DNI, contraseña) de los usuarios.
		</p>

		<div class="export-field">
			<label>Año académico</label>
			<p-select
				[options]="anioOptions"
				[ngModel]="exportAnio()"
				(ngModelChange)="exportAnio.set($event)"
				appendTo="body"
				[style]="{ width: '100%' }"
			/>
		</div>

		<div class="export-field">
			<label>Periodo</label>
			<div class="periodo-toggle">
				<button
					pButton
					icon="pi pi-calendar"
					label="Regular"
					class="p-button-sm"
					[class.p-button-outlined]="esVerano()"
					[class.active]="!esVerano()"
					(click)="setPeriodo(false)"
					[pt]="{ root: { 'aria-label': 'Periodo regular' } }"
				></button>
				<button
					pButton
					icon="pi pi-sun"
					label="Verano"
					class="p-button-sm"
					[class.p-button-outlined]="!esVerano()"
					[class.active]="esVerano()"
					(click)="setPeriodo(true)"
					[pt]="{ root: { 'aria-label': 'Periodo de verano' } }"
				></button>
			</div>
		</div>

		<div class="export-actions">
			<button
				pButton
				icon="pi pi-file-excel"
				label="Credenciales Alumnos"
				class="p-button-outlined export-btn"
				(click)="onExportCredenciales('Estudiante')"
				[pt]="{ root: { 'aria-label': 'Exportar credenciales de alumnos' } }"
			></button>
			<button
				pButton
				icon="pi pi-file-excel"
				label="Credenciales Profesores"
				class="p-button-outlined export-btn"
				(click)="onExportCredenciales('Profesor')"
				[pt]="{ root: { 'aria-label': 'Exportar credenciales de profesores' } }"
			></button>
		</div>
	</div>
</p-dialog>
<!-- #endregion -->
