<!-- #region Template -->
<div class="stat-bar">
	<button
		class="stat-badge stat-badge--total"
		[class.active]="activeTab() === null"
		(click)="onBadgeClick(null)"
		[attr.aria-label]="'Total: ' + estadisticas().totalUsuarios + ' usuarios'"
	>
		<span class="stat-badge__value">{{ estadisticas().totalUsuarios }}</span>
		<span class="stat-badge__label">total</span>
	</button>

	<span class="stat-separator">·</span>

	<button
		class="stat-badge"
		[class.active]="activeTab() === 'estudiantes'"
		(click)="onBadgeClick('estudiantes')"
		[attr.aria-label]="estadisticas().totalEstudiantes + ' estudiantes'"
	>
		<span class="stat-badge__value">{{ estadisticas().totalEstudiantes }}</span>
		<span class="stat-badge__label">estudiantes</span>
	</button>

	<span class="stat-separator">·</span>

	<button
		class="stat-badge"
		[class.active]="activeTab() === 'profesores'"
		(click)="onBadgeClick('profesores')"
		[attr.aria-label]="estadisticas().totalProfesores + ' profesores'"
	>
		<span class="stat-badge__value">{{ estadisticas().totalProfesores }}</span>
		<span class="stat-badge__label">profesores</span>
	</button>

	<span class="stat-separator">·</span>

	<button
		class="stat-badge"
		[class.active]="activeTab() === 'admin'"
		(click)="onBadgeClick('admin')"
		[attr.aria-label]="adminTotal() + ' personal admin'"
	>
		<span class="stat-badge__value">{{ adminTotal() }}</span>
		<span class="stat-badge__label">admin</span>
	</button>
</div>
<!-- #endregion -->
