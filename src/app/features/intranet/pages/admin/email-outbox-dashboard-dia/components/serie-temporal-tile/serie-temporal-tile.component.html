<section class="tile">
	<header class="tile__header">
		<div class="tile__title">
			<i class="pi pi-chart-bar"></i>
			<h3>Serie temporal</h3>
		</div>
		<p-selectButton
			[options]="granularidadOptions"
			[ngModel]="granularidad()"
			(ngModelChange)="onGranularidadChange($event)"
			optionLabel="label"
			optionValue="value"
			[allowEmpty]="false"
		/>
	</header>

	@if (loading() && !hasData()) {
		<div class="chart-skeleton">
			@for (i of [].constructor(12); track $index) {
				<app-skeleton-loader variant="rect" width="100%" height="80px" />
			}
		</div>
	} @else if (!hasData()) {
		<div class="tile__empty">
			<i class="pi pi-chart-line"></i>
			<p>Sin actividad en la ventana</p>
		</div>
	} @else {
		<div class="chart">
			@for (b of buckets(); track b.bucket) {
				<div class="chart__col" [attr.title]="(b.bucket | date: 'medium') + ' · enviados ' + b.enviados + ' · fallidos ' + b.fallidos + ' · bloqueados ' + b.bloqueadosPorCuota">
					<div class="chart__bars">
						<div class="chart__bar chart__bar--blocked" [style.height.%]="b.bloqueadosPct"></div>
						<div class="chart__bar chart__bar--failed" [style.height.%]="b.fallidosPct"></div>
						<div class="chart__bar chart__bar--sent" [style.height.%]="b.enviadosPct"></div>
					</div>
					<span class="chart__label">{{ b.bucket | date: bucketDateFormat() }}</span>
				</div>
			}
		</div>
		<footer class="legend">
			<span class="legend__item legend__item--sent"><span class="dot"></span> Enviados</span>
			<span class="legend__item legend__item--failed"><span class="dot"></span> Fallidos</span>
			<span class="legend__item legend__item--blocked"><span class="dot"></span> Bloqueados por cuota</span>
		</footer>
	}
</section>
