<!-- #region Template -->
<div class="login-overlay">
	<div class="login-modal">
		<!-- * Branding header -->
		<app-login-header title="INICIAR SESIÓN" logoSrc="images/logo.png" />

		<!-- #region Stored Sessions (quick-login) -->
		@if (storedSessions().length > 0 && !showLoginForm()) {
			<div class="stored-sessions">
				<p class="sessions-label">Sesiones guardadas</p>

				@for (session of storedSessions(); track session.sessionId) {
					<div class="session-card-wrapper">
						<button
							type="button"
							class="session-card"
							[disabled]="isLoading()"
							(click)="quickLogin(session)"
						>
							<span class="session-avatar">{{ getInitials(session.nombreCompleto) }}</span>
							<span class="session-info">
								<span class="session-name">{{ session.nombreCompleto }}</span>
								<span class="session-role">{{ session.rol }}</span>
							</span>
							<i class="pi pi-sign-in session-arrow"></i>
						</button>
						<button
							type="button"
							class="session-remove"
							aria-label="Eliminar sesión guardada"
							[disabled]="isLoading()"
							(click)="removeSession($event, session)"
						>
							<i class="pi pi-times"></i>
						</button>
					</div>
				}

				<button type="button" class="use-other-account" (click)="showForm()">
					<i class="pi pi-user-plus"></i>
					<span>Usar otra cuenta</span>
				</button>
			</div>

			<!-- ! Error from quickLogin -->
			<app-login-error-message [message]="errorMessage()" [show]="showError()" />
		}
		<!-- #endregion -->

		<!-- #region Login Form -->
		@if (storedSessions().length === 0 || showLoginForm()) {
			<!-- Back to sessions if available -->
			@if (storedSessions().length > 0) {
				<button type="button" class="back-to-sessions" (click)="backToSessions()">
					<i class="pi pi-arrow-left"></i>
					<span>Volver a sesiones guardadas</span>
				</button>
			}

			<form class="login-form" [formGroup]="loginForm" (ngSubmit)="onLogin()" autocomplete="on">
				<!-- ! Error summary -->
				<app-login-error-message [message]="errorMessage()" [show]="showError()" />

				<!-- * DNI input -->
				<app-login-input>
					<i class="pi pi-id-card"></i>
					<input
						type="text"
						pInputText
						placeholder="DNI"
						formControlName="dni"
						autocomplete="username"
						[attr.disabled]="isDisabled ? '' : null"
						maxlength="8"
						pattern="[0-9]*"
					/>
				</app-login-input>
				<app-form-error [control]="loginForm.controls.dni" />

				<!-- * Password input with toggle -->
				<app-login-input>
					<i
						class="pi password-toggle"
						[class.pi-lock]="!showPassword()"
						[class.pi-lock-open]="showPassword()"
						(click)="togglePasswordVisibility()"
					></i>
					<input
						[type]="showPassword() ? 'text' : 'password'"
						pInputText
						placeholder="Contraseña"
						formControlName="password"
						autocomplete="current-password"
						appUppercaseInput
						[attr.disabled]="isDisabled ? '' : null"
					/>
				</app-login-input>
				<app-form-error [control]="loginForm.controls.password" />

				<!-- * Role selector -->
				<app-login-role-selector>
					<i class="pi pi-users"></i>
					<p-select
						[options]="roles"
						formControlName="rol"
						optionLabel="label"
						optionValue="value"
						placeholder="Seleccione rol"
						[disabled]="isDisabled"
						class="w-full"
					/>
				</app-login-role-selector>

				<!-- * Remember me -->
				<app-login-options>
					<label class="remember-toggle">
						<span>Recordar sesión</span>
						<p-toggleSwitch formControlName="rememberMe" />
					</label>
				</app-login-options>

				<!-- * Submit -->
				<app-login-button [isLoading]="isLoading()" [disabled]="isDisabled" />
			</form>
		}
		<!-- #endregion -->
	</div>
</div>
<!-- #endregion -->
