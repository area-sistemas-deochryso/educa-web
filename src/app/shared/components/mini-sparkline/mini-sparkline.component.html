@if (hasData()) {
	@let geometry = path() ?? singlePoint();
	@if (geometry) {
		<svg
			class="mini-sparkline"
			[attr.height]="height()"
			[attr.viewBox]="'0 0 ' + geometry.viewBoxWidth + ' ' + geometry.viewBoxHeight"
			preserveAspectRatio="none"
			role="img"
			[attr.aria-label]="effectiveAriaLabel()"
		>
			@if (path()) {
				<path
					[attr.d]="geometry.d"
					fill="none"
					[attr.stroke]="color()"
					stroke-width="1.5"
					stroke-linecap="round"
					stroke-linejoin="round"
					vector-effect="non-scaling-stroke"
				/>
			}
			<circle
				[attr.cx]="geometry.lastX"
				[attr.cy]="geometry.lastY"
				r="2"
				[attr.fill]="color()"
			/>
		</svg>
	}
} @else {
	<span
		class="mini-sparkline__empty"
		role="img"
		[attr.aria-label]="effectiveAriaLabel()"
	>
		sin actividad
	</span>
}
